name: CI/CD & Auto PR

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'infra/**'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'README.md'

permissions:
  contents: write
  pull-requests: write

# Variáveis de ambiente globais para o Terraform
env:
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_db_host: ${{ secrets.TF_VAR_DB_HOST }}
  TF_VAR_db_name: ${{ secrets.TF_VAR_DB_NAME }}
  TF_VAR_db_user: ${{ secrets.TF_VAR_DB_USER }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_vpc_subnet_ids: ${{ secrets.TF_VAR_VPC_SUBNET_IDS }}
  TF_VAR_vpc_security_group_ids: ${{ secrets.TF_VAR_VPC_SECURITY_GROUP_IDS }}

jobs:
  # ------------------------------------------------------------------
  # JOB 1: VALIDAÇÃO (Testes + Plan)
  # ------------------------------------------------------------------
  validate:
    name: "Run Tests & Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 1. Executa os testes unitários
      - name: Install Dependencies and Test
        working-directory: . 
        run: |
          pip install -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:.
          pytest src/tests/

      # 2. Prepara a pasta build para o empacotamento da Lambda
      - name: Prepare Build Directory
        working-directory: .
        run: |
          echo "Criando pasta build..."
          mkdir -p build
          echo "Instalando dependências na pasta build..."
          pip install -r requirements.txt -t build/
          echo "Copiando código fonte..."
          cp -r src build/
          echo "Conteúdo da pasta build:"
          ls -R build/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

  # ------------------------------------------------------------------
  # JOB 2: AUTOMATIC PR
  # ------------------------------------------------------------------
  open-pr:
    name: "Open Pull Request"
    needs: validate
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head ${{ github.ref_name }} \
            --title "Auto PR: ${{ github.ref_name }}" \
            --body "PR criado automaticamente pela Pipeline após sucesso nos testes." \
            || echo "PR já existe ou houve erro na criação (ignorando)."

  # ------------------------------------------------------------------
  # JOB 3: DEPLOY (Apenas na main)
  # ------------------------------------------------------------------
  deploy:
    name: "Terraform Apply"
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Prepare Build Directory
        working-directory: .
        run: |
          mkdir -p build
          pip install -r requirements.txt -t build/
          cp -r src build/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
      
      - name: Show Lambda ARN
        run: terraform output lambda_arn